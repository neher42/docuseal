- name: Install Dependencies
  hosts: "{{ target_host }}"
  become: true
  tasks:
    # TODO: Add the tasks to install and start Docker

- name: Create new Linux User
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Create new Linux User
      user:
        name: ubuntu
        groups: adm,docker
        append: yes

    - name: Reconnect to server session
      meta: reset_connection

- name: Setup and Clone Repository
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Ensure target directory exists
      file:
        path: /home/ubuntu/docuseal
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    # TODO: Add the task to clone your repository

- name: Create .env file
  hosts: "{{ target_host }}"
  tasks:
    - name: Create .env file
      template:
        src: templates/.env.j2
        dest: /home/ubuntu/docuseal/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'

- name: Ensure letsencrypt directory and acme.json exist with correct permissions
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Create letsencrypt directory
      file:
        path: /home/ubuntu/docuseal/letsencrypt
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    - name: Create acme.json with strict permissions
      file:
        path: /home/ubuntu/docuseal/letsencrypt/acme.json
        state: touch
        mode: '0600'
        owner: ubuntu
        group: ubuntu

