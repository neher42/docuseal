- name: Install Dependencies
  hosts: "{{ target_host }}"
  become: true
  tasks:
    - name: Install prerequisites
      apt:
        pkg: [ca-certificates, curl]
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt sources
      copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_distribution_release }}
          Components: stable
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Install docker and supporting packages
      apt:
        pkg: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: latest
        update_cache: true

    - name: Start docker daemon
      systemd:
        name: docker
        state: started
        enabled: true

- name: Create new Linux User
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Create new Linux User
      user:
        name: ubuntu
        groups: adm,docker
        append: yes

    - name: Reconnect to server session
      meta: reset_connection

- name: Setup and Clone Repository
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Ensure target directory exists
      file:
        path: /home/ubuntu/docuseal
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: /home/ubuntu/docuseal
        clone: yes
        update: yes
        force: yes
      become_user: ubuntu

- name: Create .env file
  hosts: "{{ target_host }}"
  tasks:
    - name: Create .env file
      template:
        src: templates/.env.j2
        dest: /home/ubuntu/docuseal/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'

- name: Ensure letsencrypt directory and acme.json exist with correct permissions
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Create letsencrypt directory
      file:
        path: /home/ubuntu/docuseal/letsencrypt
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    - name: Create acme.json with strict permissions
      file:
        path: /home/ubuntu/docuseal/letsencrypt/acme.json
        state: touch
        mode: '0600'
        owner: ubuntu
        group: ubuntu

- name: Start application services
  hosts: "{{ target_host }}"
  tasks:
    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: /home/ubuntu/docuseal
        files: "docker-compose.yml"
