name: Provision Infrastructure
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: infrastructure/terraform
        env:
          # TODO: pass the github secrets and environment variables you added previously
          TF_VAR_hcloud_token: ___
          TF_VAR_ssh_public_key: ___
          TF_TOKEN_app_terraform_io: ___
        run: |
          # TODO: the same two commands you ran locally. 
          # Add -auto-approve on apply otherwise the workflow will block.
          
      - name: Export Terraform outputs
        working-directory: infrastructure/terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN }}
        # Same command you ran locally to print the server's IP.
        # Stores the output in the TARGET_HOST env variable.
        run: |
          echo "TARGET_HOST=$(terraform output -raw csee_server_ip)" >> $GITHUB_ENV

      - name: Install Ansible
        # Fresh runner has no ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible

      - name: Prepare SSH key
        # Writes the ssh private key from GH secrets into a tmp file
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

      - name: Write vault password file
        # Same idea as the SSH key: writes the vault password from a GH
        # secret into the file ansible expects.
        run: |
          mkdir -p ~/.ansible
          printf '%s' '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/.ansible/.vault_pass
          chmod 600 ~/.ansible/.vault_pass

      - name: Run Ansible
        # Almost identical to your local ansible-playbook command.
        run: |
          ansible-playbook \
          -i "$TARGET_HOST," \
          -u root \
          --private-key /tmp/key.pem \
          infrastructure/ansible/bootstrap.yml \
          --vault-password-file ~/.ansible/.vault_pass \
          -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
          -e "target_host=all" \
          -e "repo_url=${{ github.server_url }}/${{ github.repository }}.git" \
          -e "host=${TARGET_HOST}.nip.io"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ansible/.vault_pass

 