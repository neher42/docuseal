name: Build Docker Images

on:
  workflow_dispatch:
  # TODO: also trigger this workflow automatically after the "CI" workflow
  # finishes on the main branch so we only build images when linting/tests pass.
  # (hint: add a `workflow_run:` trigger with
  #  `workflows: ["CI"]`, `types: [completed]`, `branches: [main]`)

jobs:
  build:
    # TODO: skip this job unless the triggering CI run actually passed.
    # See `update-services.yml` for the pattern.
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        # TODO: set this to the GHCR image path you used in the manual step
        # (hint: ghcr.io/<owner>/<repo>:<tag> — `${{ github.repository }}` expands to <owner>/<repo>)
        tags:
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max