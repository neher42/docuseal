name: Build Docker Images

on:
  workflow_dispatch:
  # TODO: trigger this workflow automatically on pushes to the main branch
  # (hint: add a `push:` block with a `branches:` filter)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        # TODO: set this to the GHCR image path you used in the manual step
        # (hint: ghcr.io/<owner>/<repo>:<tag> — `${{ github.repository }}` expands to <owner>/<repo>)
        tags:
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max