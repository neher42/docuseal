name: Build Docker Images

on:
  workflow_dispatch:
  # TODO: also trigger this workflow automatically after the "CI" workflow
  # finishes on the main branch so we only build images when linting/tests pass.
  # (hint: add a `workflow_run:` trigger with
  #  `workflows: ["CI"]`, `types: [completed]`, `branches: [main]`)

jobs:
  build:
    # TODO: skip this job unless the triggering CI run actually passed.
    # See `update-services.yml` for the pattern.
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Buildx is required to build for multiple architectures (amd64 + arm64)
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        # TODO: authenticate against the github container registry
        registry: # <registry-name>
        username: ${{ github.actor }}
        password: # <github-access-token>

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        # TODO: should this push to the registry, or just build locally? Set a boolean value.
        push: # true | false
        # TODO: what platforms should the image be built for?
        platforms: # <platform1>,<platform2>
        # TODO: set this to the GHCR image path
        # (hint: `${{ github.repository }}` expands to <owner>/<repo>)
        tags: # <path>
        # Layer caching: speeds up rebuilds by reusing unchanged layers from a previous push
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max