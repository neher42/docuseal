name: Build Docker Images

on:
  workflow_dispatch:
  # TODO: Ensure the workflow runs after the "CI" workflow completed
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [workshop]

jobs:
  build:
    # Skip if triggered by a failing CI run. workflow_dispatch always runs
    # (manual triggers bypass the CI gate by design).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

	    - name: Setup Docker Buildx
	      uses: docker/setup-buildx-action@v4

	    - name: Login to GitHub Container Registry
	      uses: docker/login-action@v4
	      with:
	        registry: ghcr.io
	        username: ${{ github.actor }}
	        password: ${{ secrets.GITHUB_TOKEN }}

	    - name: Build and push Docker image
	      uses: docker/build-push-action@v7
	      with:
	        context: .
	        push: true
	        platforms: linux/amd64
	        tags: ghcr.io/${{ github.repository }}:latest
	        # Layer caching: speeds up rebuilds by reusing unchanged layers from a previous push
	        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:cache
	        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max